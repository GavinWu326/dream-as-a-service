services:
  backend:
    build:
      context: ./backend
    container_name: dream-service-backend
    environment:
      DREAM_DATABASE_URL: sqlite:////app/data/dreams.db
      DREAM_CORS_ORIGINS: http://localhost:3000
    volumes:
      - dream_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: dream-service-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  dream_data:
